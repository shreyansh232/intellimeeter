version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: intellimeeter-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intellimeeter

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d intellimeeter"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: intellimeeter-api
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/intellimeeter

      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

      OPENAI_API_KEY: ${OPENAI_API_KEY}

      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}

    command: >
      sh -c "
      uv run alembic upgrade head &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data: